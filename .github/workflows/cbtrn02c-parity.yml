name: CBTRN02C modernization parity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build and run the unmodified CBTRN02C baseline
        working-directory: legacy
        run: ./run_cbtrn02c.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install modern dependencies
        working-directory: modern
        run: npm ci || npm install

      - name: Typecheck
        working-directory: modern
        run: npm run typecheck

      - name: Differential CBTRN02C parity tests
        working-directory: modern
        run: node --require ts-node/register --test test/cbtrn02c.parity.test.ts
