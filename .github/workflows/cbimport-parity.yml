name: CBIMPORT modernization parity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build & run the legacy COBOL baseline (unmodified CBIMPORT)
        # Rebuilds the export fixture from source (EXPTGEN) and regenerates
        # out/cbimport.golden.txt from the unmodified CBIMPORT -- the baseline
        # is never trusted from a checked-in file.
        working-directory: legacy
        run: ./run_cbimport.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install modern deps
        working-directory: modern
        run: npm ci || npm install

      - name: Typecheck
        working-directory: modern
        run: npm run typecheck

      - name: Differential parity test (modern output == COBOL baseline)
        working-directory: modern
        run: node --require ts-node/register --test test/cbimport.parity.test.ts
