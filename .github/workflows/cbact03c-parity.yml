name: CBACT03C modernization parity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build & run the legacy COBOL baseline (unmodified CBACT03C)
        working-directory: legacy
        run: ./run_cbact03c.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install modern deps
        working-directory: modern
        run: npm ci || npm install

      - name: Typecheck
        working-directory: modern
        run: npm run typecheck

      - name: Differential parity tests (modern output == COBOL baseline)
        working-directory: modern
        run: node --require ts-node/register --test test/cbact03c.parity.test.ts
