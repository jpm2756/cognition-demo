name: CBACT01C modernization parity

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carddemo
          POSTGRES_PASSWORD: carddemo
          POSTGRES_DB: carddemo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U carddemo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install GnuCOBOL
        run: sudo apt-get update && sudo apt-get install -y gnucobol

      - name: Build & run the legacy COBOL baseline (unmodified CBACT01C)
        working-directory: legacy
        run: ./run_cobol.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install modern deps
        working-directory: modern
        run: npm ci || npm install

      - name: Typecheck
        working-directory: modern
        run: npm run typecheck

      - name: Database parity (SQL diff + SUM(curr_bal) reconciliation)
        working-directory: modern
        env:
          DATABASE_URL: postgres://carddemo:carddemo@localhost:5432/carddemo
        run: npm run test:db
